
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:360px;
    background:#fff;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
    color:#222;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0F9D58;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0b8043;
}

#qr{
    display:none;
    margin-top:20px;
}

#qr img{
    width:230px;
    border-radius:10px;
}

p{
    margin-top:10px;
    color:#555;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<h2>Pay via UPI</h2>

<input
type="number"
id="amount"
placeholder="Enter Amount"
value="100">

<button onclick="payNow()">
Pay Now
</button>

<div id="qr"></div>

</div>

<script>

const upiID="aryan223ptl@okaxis";
const payeeName="Aryan Patel";

function payNow(){

let amount=document.getElementById("amount").value;

if(amount=="" || amount<=0){
alert("Please enter a valid amount.");
return;
}

let upiLink=`upi://pay?pa=${upiID}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR&tn=Website Payment`;

window.location.href=upiLink;

setTimeout(function(){

let qrURL="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(upiLink);

document.getElementById("qr").style.display="block";

document.getElementById("qr").innerHTML=`
<img src="${qrURL}" alt="UPI QR">
<p>If your payment app did not open,<br>scan this QR using Google Pay, PhonePe, Paytm or BHIM.</p>
`;

},2000);

}

</script>

</body>
</html>
